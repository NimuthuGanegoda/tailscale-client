name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - v**
  workflow_dispatch:

jobs:
  build:
    name: Build Package
    runs-on: windows-latest

    steps:
      - name: Check out repository, with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@6bd573e3f007d833106396e7237ef7516f75a2b1 # v4.0.1
        with:
          dotnet-version: "8.x"

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@6fb0222f14251339a281047df9bb6ac441c9c6df # v2.0.0

      - name: Install windows 10 SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@18daf2c63f91ac2f18be76a5f7f0b9ba337975ab # v2
        with:
          sdk-version: '22000'

      - name: Add Win10 SDK to PATH
        run: |
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22000.0\x64"

      - name: Build x64 and ARM64
        run: |
          dotnet restore
          dotnet msbuild TailscaleClient.csproj -t:Rebuild -p:Platform=x64 -p:Configuration=Release -p:OutDir="./dist/x64/"
          dotnet msbuild TailscaleClient.csproj -t:Rebuild -p:Platform=arm64 -p:Configuration=Release -p:OutDir="./dist/arm64/"

      - name: Write version to file, trim trailing newline
        run: |
          echo $(nbgv get-version -v SimpleVersion) > ./dist/version.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@604373da71285e078bc21456283d65297f397595 # v4.3.6
        with:
          name: dist
          path: dist

  release:
    name: Release Package
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392f0232229d8a1244 # v4.1.7
        with:
          name: dist

      - name: Install packaging tools
        run: |
          dotnet tool install -g vpk

      - name: Sync vpk to current version
        run: |
          vpk download http --url https://tsc.xirreal.dev/ -c win-x64
          vpk download http --url https://tsc.xirreal.dev/ -c win-arm64

      - name: Package x64
        run: |
          vpk [win] pack --packId TailscaleClient --packVersion "$(cat ./version.txt | tr -d '\r\n')" --packDir ./x64 --channel win-x64 --framework net8.0-x64-runtime --msi -y

      - name: Package arm64
        run: |
          vpk [win] pack --packId TailscaleClient --packVersion "$(cat ./version.txt | tr -d '\r\n')" --packDir ./arm64 --channel win-arm64 --framework net8.0-arm64-runtime --msi -y

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
        run: |
          aws s3 sync --checksum-algorithm CRC32 ./Releases s3://tsc/

      - name: Create a new release
        uses: softprops/action-gh-release@c95fe1489396fe8a219672e87a5586776c5c3977 # v2.0.6
        with:
          files: ./Releases/TailscaleClient-win*